<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="AI × Phaser 遊戲上線 封面（占位）">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c0d14"/>
      <stop offset="1" stop-color="#06070b"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="22%" r="70%">
      <stop offset="0" stop-color="#6c5ce7" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#00d2d3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06070b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f5f7"/>
      <stop offset="1" stop-color="#00d2d3"/>
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#grid)"/>
  <rect width="600" height="600" fill="url(#glow)"/>

  <!-- 最小遊戲示意：掉落方塊 + 玩家方塊 + 移動軌跡 -->
  <g>
    <!-- 掉落的方塊 -->
    <rect x="360" y="300" width="34" height="34" rx="5" fill="#6c5ce7" fill-opacity="0.85"/>
    <rect x="436" y="356" width="26" height="26" rx="4" fill="#6c5ce7" fill-opacity="0.55"/>
    <rect x="300" y="356" width="22" height="22" rx="4" fill="#6c5ce7" fill-opacity="0.4"/>
    <!-- 掉落虛線 -->
    <path d="M377 250 V300 M449 318 V356 M311 330 V356" stroke="#6c5ce7" stroke-width="2" stroke-dasharray="3 7" stroke-opacity="0.6"/>
    <!-- 玩家方塊（青色發光）-->
    <rect x="356" y="448" width="44" height="44" rx="6" fill="#00d2d3"/>
    <!-- 玩家左右移動箭頭 -->
    <path d="M330 470 H316 M312 470 l8 -6 M312 470 l8 6" fill="none" stroke="#00d2d3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.8"/>
    <path d="M426 470 H440 M444 470 l-8 -6 M444 470 l-8 6" fill="none" stroke="#00d2d3" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.8"/>
  </g>

  <!-- 標題 -->
  <text x="64" y="138" font-family="'Space Grotesk',sans-serif" font-size="92" font-weight="700" fill="url(#ink)" letter-spacing="-3">AI×Phaser</text>
  <text x="68" y="196" font-family="'Noto Sans TC',sans-serif" font-size="34" font-weight="700" fill="#f5f5f7">HTML5 遊戲上線</text>
  <text x="69" y="240" font-family="'Space Grotesk',sans-serif" font-size="17" font-weight="500" fill="#9aa0aa" letter-spacing="3">CLAUDE CODE · CODEX · ANTIGRAVITY → GITHUB PAGES</text>

  <!-- 占位標記（換真圖時移除整張即可）-->
  <text x="64" y="552" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="500" fill="#9aa0aa" letter-spacing="2" opacity="0.7">PLACEHOLDER · 占位封面</text>
  <text x="536" y="552" text-anchor="end" font-family="'Space Grotesk',sans-serif" font-size="15" font-weight="700" fill="#6c5ce7" letter-spacing="2">喵Z不貓膩</text>
</svg>
