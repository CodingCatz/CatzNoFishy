<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>喵Z不貓膩 · 課程總覽</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06070b;--card:#0f1015;--ink:#f5f5f7;--dim:#9aa0aa;--accent:#6c5ce7;--accent2:#00d2d3;--line:rgba(255,255,255,.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",sans-serif;min-height:100vh;padding:90px 8vw 120px}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:64px 64px;opacity:.05;mask-image:radial-gradient(circle at 85% 8%,#000,transparent 65%)}
.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto}
.kicker{font-family:"Space Grotesk",sans-serif;letter-spacing:.28em;text-transform:uppercase;color:var(--accent2);font-size:16px;font-weight:500;margin-bottom:22px}
h1{font-family:"Space Grotesk",sans-serif;font-size:72px;line-height:1.05;font-weight:700;letter-spacing:-.02em;margin-bottom:18px}
.sub{color:var(--dim);font-size:22px;font-weight:300;max-width:820px;line-height:1.55;margin-bottom:64px}
/* 圖卡：寬度同課卡（minmax 300），上方加一張正方形封面圖空間 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:26px}
a.card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
  border-radius:18px;overflow:hidden;position:relative;transition:.25s cubic-bezier(.16,1,.3,1)}
a.card:hover{transform:translateY(-6px);border-color:var(--accent)}
/* 封面底緣弧形光暈（hover 浮現，壓扁貼邊，只在圖上、不蓋文字）*/
.cover::after{content:"";position:absolute;left:0;right:0;bottom:0;height:46px;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 80% 100% at 50% 100%,rgba(108,92,231,.6),rgba(108,92,231,.12) 45%,transparent 74%);
  opacity:0;transition:opacity .35s cubic-bezier(.16,1,.3,1)}
a.card:hover .cover::after{opacity:1}
.cover{position:relative;width:100%;aspect-ratio:1/1;background:#0b0c12;overflow:hidden}
.cover img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s cubic-bezier(.16,1,.3,1)}
a.card:hover .cover img{transform:scale(1.04)}
.cover .pin{position:absolute;top:14px;z-index:1;font-family:"Space Grotesk",sans-serif;font-size:12px;
  letter-spacing:.12em;text-transform:uppercase;color:var(--ink);background:rgba(0,0,0,.5);
  border:1px solid var(--line);padding:4px 10px;border-radius:20px;backdrop-filter:blur(6px)}
.cover .pin.left{left:16px}
.cover .pin.right{right:16px}
.body{padding:26px 28px 30px}
.num{font-family:"Space Grotesk",sans-serif;font-size:15px;color:var(--accent2);letter-spacing:.1em;font-weight:500;margin-bottom:12px}
.t{font-size:28px;font-weight:700;line-height:1.22;letter-spacing:-.01em;margin-bottom:10px}
.meta{color:var(--dim);font-size:16px;font-weight:300;line-height:1.55}
/* 核心心法：固定在視窗底部，不隨內容捲走 */
.foot{position:fixed;left:0;right:0;bottom:0;z-index:50;padding:16px 8vw;
  color:var(--dim);font-size:16px;text-align:center;
  background:rgba(6,7,11,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line)}
.foot b{color:var(--accent2)}
</style>
</head>
<body>
<div class="wrap">
  <p class="kicker">CatzNoFishy · 喵Z不貓膩</p>
  <h1>課程總覽</h1>
  <p class="sub">把「做得出具體成品」的技術主題，做成一堂堂可在瀏覽器翻頁的網頁簡報。每個課程是一張圖卡，點進去看該課程的目錄與各堂簡報。</p>
  <div class="grid" id="grid"></div>
  <p class="foot">核心心法：<b>觀念與原理通用於任何情況，工具只是當下的載體。</b></p>
</div>
<script>
// 課程清單：每門課一張圖卡。cover = 方圖路徑；href = 該課程目錄。
const COURSES=[
  {
    href:"git-github/index.html",
    cover:"covers/git-github.svg",
    pin:"Git · 版本控制",
    lessons:"1 課可上",
    num:"COURSE 01",
    title:"Git / GitHub 入門",
    meta:"從零認識 Git｜CLI 安裝 → 指令操作 → GitHub Pages 免費發布上線。"
  },
  {
    href:"xr-interaction/index.html",
    cover:"covers/xr-interaction.svg",
    pin:"XR · VR / MR",
    lessons:"2 課可上",
    num:"COURSE 02",
    title:"XR 互動場景建置",
    meta:"Unity · Unreal × Meta Quest 2/3｜抓 / 指 / 走，手把與空手雙路徑。"
  },
];
const g=document.getElementById('grid');
COURSES.forEach(c=>{
  const a=document.createElement('a');a.className='card';a.href=c.href;
  a.innerHTML=`<div class="cover"><span class="pin left">${c.pin}</span><span class="pin right">${c.lessons}</span><img src="${c.cover}" alt="${c.title}"></div>
    <div class="body"><div class="num">${c.num}</div><div class="t">${c.title}</div><div class="meta">${c.meta}</div></div>`;
  g.appendChild(a);
});
</script>
</body>
</html>
